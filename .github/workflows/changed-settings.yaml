name: Check for changed settings

on:
  workflow_call:
    inputs:
      version_file:
        description: Repo-relative path to the file that contains version information
        required: true
        type: string
      version_regexp:
        description: The regexp pattern to extract version from the version file. The first capturing group must contain the released version tag present in repository_url.
        required: true
        type: string
      version_transform:
        description: Optional string used to transform the tag captured by version_regexp. This can for example add a 'v' in front of the tag. The {} is replaced with the captured tag.
        default: '{}'
        required: false
        type: string
    outputs:
      version_changed:
        description: Set to 'true' if version has changed relative to the main branch.
        value: ${{ jobs.changed_settings.outputs.version_changed }}
      new_version:
        description: Set to the tag of the new version.
        value: ${{ jobs.changed_settings.outputs.new_version }}
      settings_changed:
        description: Set to 'true' if settings have changed between versions, 'false' if output was "No changes".
        value: ${{ jobs.changed_settings.outputs.settings_changed }}

permissions:
  contents: write
  pull-requests: write
  repository-projects: write

jobs:
  changed_settings:
    runs-on: ubuntu-latest

    outputs:
      version_changed: ${{ steps.version-check.outputs.version_changed }}
      new_version: ${{ steps.tag-to.outputs.version }}
      settings_changed: ${{ steps.settings-changed-check.outputs.settings_changed }}

    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Get version from default branch
        id: tag-from
        env:
          FILE: ${{ inputs.version_file }}
          VERSION: ${{ inputs.version_regexp }}
        run: echo "version=$(rg -o "$VERSION" -r "\$1" "$FILE")" >> "$GITHUB_OUTPUT"

      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          path: pr

      - name: Get version from PR
        id: tag-to
        working-directory: pr
        env:
          FILE: ${{ inputs.version_file }}
          VERSION: ${{ inputs.version_regexp }}
        run: echo "version=$(rg -o "$VERSION" -r "\$1" "$FILE")" >> "$GITHUB_OUTPUT"

      - id: version-check
        run: echo "version_changed=${{ steps.tag-from.outputs.version != steps.tag-to.outputs.version }}" >> "$GITHUB_OUTPUT"

      - if: steps.version-check.outputs.version_changed == 'true'
        name: Checkout workflow repo
        uses: actions/checkout@v6
        with:
          repository: sublimelsp/workflows
          ref: v2
          path: workflow-repo

      - if: steps.version-check.outputs.version_changed == 'true'
        name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          working-directory: workflow-repo

      - if: steps.version-check.outputs.version_changed == 'true'
        name: Run changed_settings script
        id: changed_settings
        working-directory: pr
        run: |
          VERSION_FROM="${{ steps.tag-from.outputs.version }}"
          VERSION_TO="${{ steps.tag-to.outputs.version }}"
          VERSION_TRANSFORM="${{ inputs.version_transform }}"

          TRANSFORMED_FROM="${VERSION_TRANSFORM//\{\}/$VERSION_FROM}"
          TRANSFORMED_TO="${VERSION_TRANSFORM//\{\}/$VERSION_TO}"

          echo "transformed_from: ${TRANSFORMED_FROM}"
          echo "transformed_to: ${TRANSFORMED_TO}"

          uv run --project ../workflow-repo ../workflow-repo/scripts/changed_settings.py \
            "$TRANSFORMED_FROM" \
            "$TRANSFORMED_TO" > "$RUNNER_TEMP/changes.md"

      - if: steps.version-check.outputs.version_changed == 'true'
        name: Check for changes
        id: settings-changed-check
        run: |
          if grep -q "No changes" "$RUNNER_TEMP/changes.md"; then
            echo "settings_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "settings_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.settings-changed-check.outputs.settings_changed == 'true'
        name: Commit and push changes
        working-directory: pr
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --staged --quiet || git commit -m "chore: update"
          git push

      - if: steps.version-check.outputs.version_changed == 'true'
        name: Find Comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'

      - if: steps.version-check.outputs.version_changed == 'true'
        name: Create or update comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ runner.temp }}/changes.md
          edit-mode: replace
